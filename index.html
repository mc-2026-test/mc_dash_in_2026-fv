async function cargarExcelNetlify() {
  try {
    console.log('1. Intentando cargar Excel...');
    var response = await fetch('./dashboard_oln.xlsx?t=' + Date.now());
    console.log('2. Fetch status:', response.status, response.ok);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    var buffer = await response.arrayBuffer();
    console.log('3. Buffer size:', buffer.byteLength, 'bytes');
    if (buffer.byteLength < 1000) throw new Error('Archivo muy pequeño o vacío');
    var wb = XLSX.read(new Uint8Array(buffer), { type: 'array', cellDates:true });
    console.log('4. Hojas encontradas:', wb.SheetNames);
    var ok = parseExcel(wb);
    console.log('5. parseExcel resultado:', ok, '- Lotes:', D.length);
    if (ok) {
      sY = 'ALL'; sM = 'ALL'; sP = 'ALL'; sDay = 'ALL';
      render();
      console.log('6. Render OK - ' + D.length + ' lotes cargados');
    }
  } catch (e) {
    console.error('ERROR cargando Excel:', e);
  }
}


async function cargarConsumo628(){
  var files=['./consumo_628.xlsx','./Consumo%20628.xlsx','./Consumo 628.xlsx','./consumo 628.xlsx','./628.xlsx'];
  for(var i=0;i<files.length;i++){
    try{
      var response=await fetch(files[i]+'?t='+Date.now());
      if(!response.ok)continue;
      var buffer=await response.arrayBuffer();
      if(buffer.byteLength<1000)continue;
      var wb=XLSX.read(new Uint8Array(buffer),{type:'array',cellDates:true});
      if(parseConsumoWorkbook(wb,true)){console.log('Consumo 628 cargado:',files[i],ENV.length);render();return;}
    }catch(e){}
  }
  console.log('Consumo 628 no encontrado como archivo externo. Medio ambiente mostrará DQO y lo que exista en dashboard_oln.xlsx.');
}
window.addEventListener('load', function(){cargarExcelNetlify().then(cargarConsumo628);});
